# DeadCenter Docker Stack
# Deploy via: docker compose build --no-cache app && docker compose up -d --force-recreate app scheduler queue

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: deadcenter-app:latest
    container_name: deadcenter-app
    restart: unless-stopped
    environment:
      - APP_NAME=DeadCenter
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_TIMEZONE=Africa/Johannesburg
      - TZ=Africa/Johannesburg
      - APP_URL=${APP_URL:-https://deadcenter.co.za}
      - APP_KEY=${APP_KEY}
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-deadcenter}
      - DB_USERNAME=${DB_USERNAME:-deadcenter}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CACHE_STORE=redis
      - SESSION_DRIVER=redis
      - QUEUE_CONNECTION=redis
      - MAIL_MAILER=${MAIL_MAILER:-smtp}
      - MAIL_HOST=${MAIL_HOST:-}
      - MAIL_PORT=${MAIL_PORT:-587}
      - MAIL_USERNAME=${MAIL_USERNAME:-}
      - MAIL_PASSWORD=${MAIL_PASSWORD:-}
      - MAIL_ENCRYPTION=${MAIL_ENCRYPTION:-tls}
      - MAIL_FROM_ADDRESS=${MAIL_FROM_ADDRESS:-noreply@deadcenter.co.za}
      - MAIL_FROM_NAME=${MAIL_FROM_NAME:-DeadCenter}
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY:-}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY:-}
      - SANCTUM_STATEFUL_DOMAINS=deadcenter.co.za,md.deadcenter.co.za,app.deadcenter.co.za
      - SESSION_DOMAIN=.deadcenter.co.za
    volumes:
      - app-logs:/var/www/html/storage/logs
      - app-storage:/var/www/html/storage/app/public
    ports:
      - "${APP_PORT:-8091}:80"
    networks:
      - deadcenter-network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  db:
    image: mysql:8.0
    container_name: deadcenter-db
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD:-${DB_PASSWORD}}
      - MYSQL_DATABASE=${DB_DATABASE:-deadcenter}
      - MYSQL_USER=${DB_USERNAME:-deadcenter}
      - MYSQL_PASSWORD=${DB_PASSWORD}
    volumes:
      - db-data:/var/lib/mysql
    ports:
      - "${DB_PORT:-3307}:3306"
    networks:
      - deadcenter-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-${DB_PASSWORD}}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    container_name: deadcenter-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - deadcenter-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    image: deadcenter-app:latest
    container_name: deadcenter-scheduler
    restart: unless-stopped
    command: sh -c "while true; do php /var/www/html/artisan schedule:run --verbose --no-interaction & sleep 60; done"
    environment:
      - APP_ENV=production
      - APP_TIMEZONE=Africa/Johannesburg
      - TZ=Africa/Johannesburg
      - APP_KEY=${APP_KEY}
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-deadcenter}
      - DB_USERNAME=${DB_USERNAME:-deadcenter}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - QUEUE_CONNECTION=redis
    volumes:
      - app-logs:/var/www/html/storage/logs
    networks:
      - deadcenter-network
    depends_on:
      - app
      - db
      - redis

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    image: deadcenter-app:latest
    container_name: deadcenter-queue
    restart: unless-stopped
    command: php /var/www/html/artisan queue:work redis --sleep=3 --tries=3 --max-time=3600
    environment:
      - APP_ENV=production
      - APP_TIMEZONE=Africa/Johannesburg
      - TZ=Africa/Johannesburg
      - APP_KEY=${APP_KEY}
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-deadcenter}
      - DB_USERNAME=${DB_USERNAME:-deadcenter}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - QUEUE_CONNECTION=redis
      - MAIL_MAILER=${MAIL_MAILER:-smtp}
      - MAIL_HOST=${MAIL_HOST:-}
      - MAIL_PORT=${MAIL_PORT:-587}
      - MAIL_USERNAME=${MAIL_USERNAME:-}
      - MAIL_PASSWORD=${MAIL_PASSWORD:-}
      - MAIL_ENCRYPTION=${MAIL_ENCRYPTION:-tls}
      - MAIL_FROM_ADDRESS=${MAIL_FROM_ADDRESS:-noreply@deadcenter.co.za}
      - MAIL_FROM_NAME=${MAIL_FROM_NAME:-DeadCenter}
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY:-}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY:-}
    volumes:
      - app-logs:/var/www/html/storage/logs
    networks:
      - deadcenter-network
    depends_on:
      - app
      - db
      - redis

networks:
  deadcenter-network:
    driver: bridge

volumes:
  app-logs:
  app-storage:
  db-data:
  redis-data:
