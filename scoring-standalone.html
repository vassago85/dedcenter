<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
        <meta name="theme-color" content="#0f172a" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
        <title>DeadCenter Scoring</title>
        <style>
            html, body, #scoring-app { height: 100%; margin: 0; background: #0f172a; color: #f1f5f9; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
            /*
              Boot splash painted from inline CSS so the user sees something the
              instant the WebView loads index.html — even before main-standalone.js
              finishes parsing. Vue's mount replaces #scoring-app's children, which
              clears this splash. If main-standalone.js itself crashes on parse the
              splash stays on screen and the user knows the app loaded but JS broke
              (vs a fully blank screen which gives them no signal).
            */
            #boot-splash { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 16px; padding: 24px; text-align: center; }
            #boot-splash .logo { font-size: 22px; font-weight: 800; letter-spacing: 0.04em; }
            #boot-splash .logo .accent { color: #ef4444; }
            #boot-splash .spinner { width: 32px; height: 32px; border-radius: 50%; border: 3px solid #1e293b; border-top-color: #ef4444; animation: dc-spin 0.8s linear infinite; }
            #boot-splash .hint { font-size: 12px; color: #64748b; max-width: 280px; }
            @keyframes dc-spin { to { transform: rotate(360deg); } }
        </style>
    </head>
    <body>
        <div id="scoring-app">
            <div id="boot-splash">
                <div class="logo"><span>DEAD</span><span class="accent">CENTER</span></div>
                <div class="spinner" role="status" aria-label="Loading"></div>
                <div class="hint">Starting up… if this screen sticks for more than 10 seconds, force-stop the app and reopen.</div>
            </div>
        </div>
        <script type="module" src="/resources/js/scoring-app/main-standalone.js"></script>
    </body>
</html>
